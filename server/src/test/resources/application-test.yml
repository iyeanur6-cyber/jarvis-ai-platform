# ═══════════════════════════════════════════════════
# Jarvis AI Platform — Test Configuration
# Loaded when spring.profiles.active=test
# ═══════════════════════════════════════════════════

spring:

  # Disable Spring Shell interactive mode
  # Without this: Shell tries to start terminal
  # in CI where there is no terminal → job canceled
  shell:
    interactive:
      enabled: false

  # No Spring banner in test output
  main:
    banner-mode: off
    log-startup-info: false

  # Gemini excluded (no API key in tests)
  ai:
    google:
      api-key: ""

# Suppress unnecessary logging during tests
logging:
  level:
    ai.jarvis: WARN
    org.springframework: WARN
    io.r2dbc: WARN
    org.flywaydb: WARN
    reactor.netty: WARN